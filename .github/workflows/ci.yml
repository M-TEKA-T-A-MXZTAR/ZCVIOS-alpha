name: zcvios-ci

# Root verification runs once for each pull-request head and may also be started manually.
# Push-trigger duplication is intentionally avoided; stale runs for the same PR are cancelled.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: zcvios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTAUTH_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      NEXTAUTH_URL: http://localhost:3001
      REACT_APP_BACKEND_URL: http://localhost:3001
      ZCVIOS_TEST_DATABASE_PATH: ${{ github.workspace }}/ci-integration.db

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.18.0
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests

      - name: Install npm dependencies
        run: npm ci

      - name: Verify repository hygiene
        run: npm run verify:repository-hygiene

      - name: Verify CI policy
        run: npm run verify:ci-policy

      - name: Verify toolchain policy
        run: npm run verify:toolchain-policy

      - name: Verify offline font policy
        run: npm run verify:offline-fonts

      - name: Verify core calculations
        run: npx tsx scripts/verify-core-engine.ts

      - name: Verify existing mission query
        run: npx tsx scripts/verify-application-services.ts mission-existing-query

      - name: Verify existing mission payload
        run: npx tsx scripts/verify-application-services.ts mission-existing-payload

      - name: Verify existing mission inactivity
        run: npx tsx scripts/verify-application-services.ts mission-existing-inactivity

      - name: Verify existing mission no-write behavior
        run: npx tsx scripts/verify-application-services.ts mission-existing-no-write

      - name: Verify existing mission no-generator behavior
        run: npx tsx scripts/verify-application-services.ts mission-existing-no-generator

      - name: Verify reset mission path
        run: npx tsx scripts/verify-application-services.ts mission-reset

      - name: Verify generated mission path
        run: npx tsx scripts/verify-application-services.ts mission-generated

      - name: Verify report application service
        run: npx tsx scripts/verify-application-services.ts report

      - name: Verify identity boundary
        run: npx tsx scripts/verify-identity-boundary.ts

      - name: Verify desktop and package boundaries
        run: |
          npm run verify:desktop-shell
          npm run verify:desktop-persistence
          npm run verify:linux-package-metadata

      - name: Generate Prisma client
        env:
          DATABASE_URL: file:./ci-build.db
        run: npx prisma generate

      - name: Prepare build database
        env:
          DATABASE_URL: file:./ci-build.db
        run: |
          npx prisma migrate deploy
          npm run seed

      - name: Lint
        run: npm run lint

      - name: Build application once
        env:
          DATABASE_URL: file:./ci-build.db
          NODE_ENV: production
        run: npm run build

      - name: Prepare isolated integration database
        env:
          DATABASE_URL: file:./ci-integration.db
        run: |
          npx prisma migrate deploy
          npm run seed

      - name: Start application
        env:
          DATABASE_URL: file:./ci-integration.db
          PORT: "3001"
        run: |
          npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001 >/dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app... attempt $i"
            sleep 2
          done
          echo "Application failed to start"
          cat /tmp/app.log
          exit 1

      - name: Run integration tests
        env:
          DATABASE_URL: file:./ci-integration.db
        run: npm test

      - name: Print logs on failure
        if: failure()
        run: cat /tmp/app.log || true

      - name: Stop application
        if: always()
        run: |
          if [[ -f /tmp/app.pid ]]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi
