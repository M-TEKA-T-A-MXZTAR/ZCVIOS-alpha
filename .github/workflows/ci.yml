name: zcvios-ci

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: zcvios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTAUTH_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      NEXTAUTH_URL: http://localhost:3001
      REACT_APP_BACKEND_URL: http://localhost:3001
      ZCVIOS_TEST_DATABASE_PATH: ${{ github.workspace }}/ci-integration.db

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.18.0
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests

      - name: Install npm dependencies
        run: npm ci

      - name: Verify deterministic core and repository policy
        run: npm run test:core

      - name: Generate Prisma client
        env:
          DATABASE_URL: file:./ci-build.db
        run: npx prisma generate

      - name: Prepare build database
        env:
          DATABASE_URL: file:./ci-build.db
        run: |
          npx prisma migrate deploy
          npm run seed

      - name: Lint
        run: npm run lint

      - name: Build application once
        env:
          DATABASE_URL: file:./ci-build.db
          NODE_ENV: production
        run: npm run build

      - name: Prepare isolated integration database
        env:
          DATABASE_URL: file:./ci-integration.db
        run: |
          npx prisma migrate deploy
          npm run seed

      - name: Start application
        env:
          DATABASE_URL: file:./ci-integration.db
          PORT: "3001"
        run: |
          npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001 >/dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app... attempt $i"
            sleep 2
          done
          echo "Application failed to start"
          cat /tmp/app.log
          exit 1

      - name: Run integration tests
        env:
          DATABASE_URL: file:./ci-integration.db
        run: npm test

      - name: Print logs on failure
        if: failure()
        run: cat /tmp/app.log || true

      - name: Stop application
        if: always()
        run: |
          if [[ -f /tmp/app.pid ]]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi
