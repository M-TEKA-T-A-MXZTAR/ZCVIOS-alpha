# Dependency Review Action
#
# This workflow compares dependency-manifest changes on pull requests targeting main.
# It is PR-only because the action requires pull-request dependency snapshots.
name: 'Dependency review'

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          comment-summary-in-pr: always
