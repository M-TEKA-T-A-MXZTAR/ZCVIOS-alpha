name: zcvios-desktop-shell-ci

on:
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/application/identity.ts'
      - 'scripts/verify-desktop-shell.mjs'
      - '.github/workflows/desktop-ci.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-shell:
    name: Desktop Shell Build & Launch
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install desktop frontend dependencies
        run: npm install --prefix desktop --ignore-scripts

      - name: Build desktop frontend
        run: npm run build --prefix desktop

      - name: Verify desktop boundaries
        run: node scripts/verify-desktop-shell.mjs

      - name: Install Tauri Linux dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          if ! sudo apt-get update > /tmp/zcvios-apt.log 2>&1; then
            tail -n 120 /tmp/zcvios-apt.log
            exit 1
          fi
          if ! sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb >> /tmp/zcvios-apt.log 2>&1; then
            tail -n 120 /tmp/zcvios-apt.log
            exit 1
          fi
          echo "Tauri Linux dependencies installed."

      - name: Confirm Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build native desktop shell
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo build --quiet --manifest-path desktop/src-tauri/Cargo.toml 2> /tmp/zcvios-cargo-error.log
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cat /tmp/zcvios-cargo-error.log
            exit "$status"
          fi

      - name: Upload native compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zcvios-native-compiler-diagnostics
          path: /tmp/zcvios-cargo-error.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Launch native shell under Xvfb
        run: |
          set +e
          xvfb-run -a timeout 8s desktop/src-tauri/target/debug/zcvios-desktop > /tmp/zcvios-desktop.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 124 ]; then
            cat /tmp/zcvios-desktop.log
            echo "Desktop shell did not remain open for the smoke-test window."
            exit 1
          fi
          cat /tmp/zcvios-desktop.log || true
