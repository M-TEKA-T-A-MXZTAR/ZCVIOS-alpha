name: zcvios-desktop-shell-ci

on:
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/application/identity.ts'
      - 'scripts/verify-desktop-shell.mjs'
      - '.github/workflows/desktop-ci.yml'
      - 'package.json'
  workflow_dispatch:

permissions: read-all

jobs:
  desktop-shell:
    name: Desktop Shell Build & Launch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop frontend dependencies
        run: npm install --prefix desktop --ignore-scripts

      - name: Build desktop frontend
        run: npm run build --prefix desktop

      - name: Verify desktop boundaries
        run: node scripts/verify-desktop-shell.mjs

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native desktop shell
        run: cargo build --manifest-path desktop/src-tauri/Cargo.toml

      - name: Launch native shell under Xvfb
        run: |
          set +e
          xvfb-run -a timeout 8s desktop/src-tauri/target/debug/zcvios-desktop > /tmp/zcvios-desktop.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 124 ]; then
            cat /tmp/zcvios-desktop.log
            echo "Desktop shell did not remain open for the smoke-test window."
            exit 1
          fi
          cat /tmp/zcvios-desktop.log || true
